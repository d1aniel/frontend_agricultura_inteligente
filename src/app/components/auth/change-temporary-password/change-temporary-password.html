<section class="auth-page">
  <div class="auth-panel">
    <header>
      <span class="brand-mark">RI</span>
      <p>Sistema de riego inteligente</p>
      <h1>Cambiar contrasena temporal</h1>
      <small>{{ message() || 'Define una contrasena personal antes de continuar.' }}</small>
    </header>

    <form class="auth-form" (ngSubmit)="submit()">
      <label>
        <span>Contrasena temporal</span>
        <input type="password" name="password_actual" [(ngModel)]="form.password_actual" required autocomplete="current-password" />
      </label>

      <label>
        <span>Nueva contrasena</span>
        <input type="password" name="nueva_password" [(ngModel)]="form.nueva_password" required autocomplete="new-password" />
      </label>

      <label>
        <span>Confirmar nueva contrasena</span>
        <input type="password" name="confirmar_password" [(ngModel)]="form.confirmar_password" required autocomplete="new-password" />
      </label>

      <button type="submit" class="primary-action" [disabled]="loading()">
        {{ loading() ? 'Guardando...' : 'Cambiar contrasena' }}
      </button>
    </form>
  </div>
</section>
