<section class="auth-page">
  <div class="auth-panel">
    <header>
      <span class="brand-mark">RI</span>
      <p>Sistema de riego inteligente</p>
      <h1>Recuperar acceso</h1>
      <small>{{ message() || 'Ingresa tu usuario o correo para solicitar ayuda.' }}</small>
    </header>

    <form class="auth-form" (ngSubmit)="submit()">
      <label>
        <span>Usuario o correo</span>
        <input type="text" name="identificador" [(ngModel)]="form.identificador" required autocomplete="username" />
      </label>

      <button type="submit" class="primary-action" [disabled]="loading()">
        {{ loading() ? 'Enviando solicitud...' : 'Solicitar recuperacion' }}
      </button>
    </form>

    <footer>
      <a routerLink="/login">Volver al inicio de sesion</a>
    </footer>
  </div>
</section>
