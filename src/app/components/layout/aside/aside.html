<div class="brand">
  <a class="brand-link" routerLink="/">
    <span class="brand-mark">RI</span>
    <span>
      <strong>Riego IoT</strong>
      <small>Administracion</small>
    </span>
  </a>
</div>

<nav class="nav-list" aria-label="Modulos administrativos">
  <a class="nav-item" routerLink="/" routerLinkActive="nav-item-active" [routerLinkActiveOptions]="{ exact: true }">
    Panel general
  </a>

  <a class="nav-item" routerLink="/cambiar-contrasena" routerLinkActive="nav-item-active">
    Restablecer contrasena
  </a>

  @for (group of groups(); track group.label) {
    <a class="nav-item" [routerLink]="['/', group.items[0].route]" routerLinkActive="nav-item-active">
      {{ group.label }}
    </a>
  }
</nav>
