<section class="crud-page">
  <header class="crud-header">
    <div>
      <p>Cuenta</p>
      <h2>Cambiar contrasena</h2>
      <small>{{ message() || 'Actualiza tu contrasena personal.' }}</small>
    </div>
  </header>

  <form class="crud-form" (ngSubmit)="submit()">
    <label>
      <span>Contrasena actual</span>
      <input
        type="password"
        name="password_actual"
        [(ngModel)]="form.password_actual"
        required
        autocomplete="current-password"
      />
    </label>

    <label>
      <span>Nueva contrasena</span>
      <input
        type="password"
        name="nueva_password"
        [(ngModel)]="form.nueva_password"
        required
        autocomplete="new-password"
      />
    </label>

    <label>
      <span>Confirmar nueva contrasena</span>
      <input
        type="password"
        name="confirmar_password"
        [(ngModel)]="form.confirmar_password"
        required
        autocomplete="new-password"
      />
    </label>

    <button type="submit" class="primary-action" [disabled]="loading()">
      {{ loading() ? 'Guardando...' : 'Guardar contrasena' }}
    </button>
  </form>
</section>
